name: clawbio-locuscompare
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python>=3.10
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=1.5
  - matplotlib>=3.7
  - pysam>=0.22
  - pyyaml>=6.0
  - pydantic>=2.0
  - requests>=2.28
  # plink (1.9, NOT 2.x) is optional (LD coloring); if installed, locuscompare
  # uses it via subprocess. The bundled `ld-1000g-region-compute` sibling pins
  # plink 1.9 because plink 2's `--r2-unphased` semantics + ID conventions
  # diverge from the 1000G Phase 3 GRCh38 panel we ship against. plink is
  # GPL-3 (subprocess only; no GPL contamination of the MIT-licensed skill code).
  - plink=1.9
