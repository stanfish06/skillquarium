name: Update skills + rebuild

# Pulls the latest version of every skill from its upstream source using the
# Vercel skills CLI (`npx skills update -g`), then rebuilds the navigation layer
# and commits any changes back.
#
# How CI reconstructs the CLI's global layout
# -------------------------------------------
# The skills CLI installs "global" skills into its canonical dir,
# $HOME/.agents/skills, and records provenance (source repo, path, ref, hash)
# in $HOME/.agents/.skill-lock.json — which lives ABOVE this repo and so is not
# part of it. We therefore keep a committed snapshot at
# .skill-vault/skill-lock.json and, in CI, rebuild the layout by symlinking the
# canonical dir to this checkout and restoring the lock next to it. The CLI then
# updates this repo in place.
#
# Source coverage
# ---------------
# `skills update` only auto-updates skills whose lock entry is sourceType
# "github" (installed via owner/repo or an https GitHub URL): it diffs the skill
# folder hash via the GitHub API and reinstalls the ones that changed. Skills
# added from raw "git@github.com:..."/SSH remotes (sourceType "git") or local
# paths are NOT auto-updated by the CLI, so this vault deliberately keeps every
# skill as a github source (see .skill-vault/skill-lock.json). GITHUB_TOKEN is
# used only to raise the API rate limit; all current sources are public.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vault-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update all global skills from upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: "true"
        run: |
          set -euo pipefail
          # The CLI's canonical global skills dir is $HOME/.agents/skills.
          # Point it at this checkout so the update rewrites the repo in place,
          # and restore the committed provenance lock beside it.
          mkdir -p "$HOME/.agents"
          ln -sfn "$GITHUB_WORKSPACE" "$HOME/.agents/skills"
          cp "$GITHUB_WORKSPACE/.skill-vault/skill-lock.json" "$HOME/.agents/.skill-lock.json"

          # Pinned for reproducibility; bump deliberately. `update -g` only
          # touches github-sourced global skills; `-y` makes it non-interactive.
          npx -y skills@1.5.10 update -g -y

          # Persist the refreshed lock back into the committed snapshot.
          cp "$HOME/.agents/.skill-lock.json" "$GITHUB_WORKSPACE/.skill-vault/skill-lock.json"

      - name: Rebuild navigation layer
        # --prune drops wrapper notes for skills removed upstream (and their
        # personal notes). Safe here because this job is the upstream-sync path.
        run: python3 .skill-vault/build.py --prune

      - name: Test vault navigation
        run: python3 -m unittest discover -s .skill-vault/tests -p 'test_*.py' -v

      - name: Commit updated skills + index
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "All skills already up to date — nothing to commit."
          else
            git commit -m "chore(skills): update from upstream + rebuild index [skip ci]"
            # Re-sync before pushing in case master advanced since checkout.
            git push || { git pull --rebase origin master && git push; }
          fi
